name: Sync to HCL-QA-Agent

on:
  # Trigger on any push to any branch
  push:
    branches:
      - '**'
  
  # Allow manual trigger
  workflow_dispatch:

env:
  TARGET_REPO: cerealkiller2527/HCL-QA-Agent
  YOUR_NAME: "Madhav Lodha"
  YOUR_EMAIL: "madhavlodha2503@gmail.com"

jobs:
  sync-to-target:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout source repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Git
      run: |
        git config --global user.name "${{ env.YOUR_NAME }}"
        git config --global user.email "${{ env.YOUR_EMAIL }}"
    
    - name: Get branch name
      id: branch-name
      run: |
        # Get the branch that was pushed to
        BRANCH_NAME=${GITHUB_REF#refs/heads/}
        echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
        echo "Processing branch: $BRANCH_NAME"
        
        # Determine target branch name
        if [ "$BRANCH_NAME" = "prototype-frontend-template" ]; then
          TARGET_BRANCH="frontend-prototype"
        elif [ "$BRANCH_NAME" = "main" ]; then
          TARGET_BRANCH="frontend-main"
        else
          TARGET_BRANCH="frontend-$BRANCH_NAME"
        fi
        echo "target_branch=$TARGET_BRANCH" >> $GITHUB_OUTPUT
        echo "Target branch will be: $TARGET_BRANCH"
    
    - name: Create temporary workspace
      run: |
        # Create a temp directory for processing
        mkdir -p temp-sync
        cp -r .git temp-sync/
        cd temp-sync
        git checkout ${{ steps.branch-name.outputs.branch }}
    
    - name: Rewrite commit history
      run: |
        cd temp-sync
        
        # Create a new branch for rewriting
        git checkout -b temp-rewrite-${{ github.run_id }}
        
        # Rewrite all commits to change author
        echo "Rewriting author information..."
        FILTER_BRANCH_SQUELCH_WARNING=1 git filter-branch --env-filter '
          export GIT_AUTHOR_NAME="'"${{ env.YOUR_NAME }}"'"
          export GIT_AUTHOR_EMAIL="'"${{ env.YOUR_EMAIL }}"'"
          export GIT_COMMITTER_NAME="'"${{ env.YOUR_NAME }}"'"
          export GIT_COMMITTER_EMAIL="'"${{ env.YOUR_EMAIL }}"'"
        ' --tag-name-filter cat -- --all 2>/dev/null
        
        # Remove v0 mentions and Co-authored-by lines from commit messages
        echo "Cleaning commit messages..."
        FILTER_BRANCH_SQUELCH_WARNING=1 git filter-branch -f --msg-filter '
          sed -e "s/[Vv]0//g" \
              -e "/Co-authored-by:/d" \
              -e "s/by v0//g" \
              -e "s/Created with v0//g" \
              -e "s/Generated by v0//g" \
              -e "s/v0 helped//g"
        ' -- --all 2>/dev/null
    
    - name: Push to HCL-QA-Agent
      env:
        # You need to add a Personal Access Token as a secret in your repository
        # Go to Settings > Secrets and variables > Actions > New repository secret
        # Name: TARGET_REPO_TOKEN
        # Value: Your GitHub Personal Access Token with repo permissions
        TARGET_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
      run: |
        cd temp-sync
        
        # Add target repository as remote
        git remote add target https://x-access-token:${TARGET_TOKEN}@github.com/${{ env.TARGET_REPO }}.git
        
        # Force push the rewritten branch to target
        echo "Pushing to ${{ env.TARGET_REPO }} branch: ${{ steps.branch-name.outputs.target_branch }}"
        git push target temp-rewrite-${{ github.run_id }}:${{ steps.branch-name.outputs.target_branch }} --force
        
        echo "✅ Successfully synced to ${{ env.TARGET_REPO }}"
    
    - name: Create summary
      run: |
        echo "## Sync Complete! 🎉" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Details:" >> $GITHUB_STEP_SUMMARY
        echo "- **Source Branch:** \`${{ steps.branch-name.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Target Repository:** [${{ env.TARGET_REPO }}](https://github.com/${{ env.TARGET_REPO }})" >> $GITHUB_STEP_SUMMARY
        echo "- **Target Branch:** [\`${{ steps.branch-name.outputs.target_branch }}\`](https://github.com/${{ env.TARGET_REPO }}/tree/${{ steps.branch-name.outputs.target_branch }})" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "All commits have been rewritten with author: **${{ env.YOUR_NAME }}**" >> $GITHUB_STEP_SUMMARY
    
    - name: Cleanup
      if: always()
      run: |
        rm -rf temp-sync